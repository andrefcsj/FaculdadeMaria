{% extends 'base.html' %}
{% block title %}Editar Operação{% endblock %}
{% block content %}
<style>
.edit-page{max-width:1450px;margin:auto;padding:20px}
.edit-header h1{font-size:56px;margin-bottom:8px;color:#1f2937}
.edit-header p{font-size:22px;color:#6b7280}
.edit-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:28px;
  padding:34px;
  margin-top:28px;
  box-shadow:0 8px 24px rgba(0,0,0,.05)
}
.edit-section-title{
  font-size:34px;
  font-weight:800;
  margin-bottom:28px;
  color:#1f2937;
}
.edit-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(250px,1fr));
  gap:32px 42px;
  align-items:start;
}
.field label{
  display:block;
  font-size:24px;
  font-weight:700;
  margin-bottom:12px;
  color:#1f2937;
}
.field input,
.field select{
  width:100%;
  min-height:68px;
  padding:16px 18px;
  border:1px solid #d1d5db;
  border-radius:18px;
  font-size:30px;
  background:#fff;
  color:#111827;
  box-sizing:border-box;
}
.edit-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:36px;
}
.cancel-btn,
.save-btn{
  padding:20px;
  border-radius:20px;
  font-size:26px;
  font-weight:700;
  text-decoration:none;
  text-align:center;
  border:none;
  cursor:pointer;
}
.cancel-btn{
  background:#fff;
  border:2px solid #2563eb;
  color:#2563eb;
}
.save-btn{
  background:linear-gradient(90deg,#2563eb,#4f8df7);
  color:#fff;
}
@media(max-width:1200px){
  .edit-grid{grid-template-columns:1fr}
  .edit-header h1{font-size:40px}
}
</style>

<div class="edit-page">
  <div class="edit-header">
    <h1>✏️ Editar Operação</h1>
    <p>Altere as informações da operação e salve as mudanças.</p>
  </div>

  <form method="post">
    <div class="edit-card">
      <div class="edit-section-title">📄 Informações Básicas</div>
      <div class="edit-grid">
        <div class="field">
          <label>Código da Opção</label>
          <input type="text" name="Ativo" value="{{ op.get('Ativo','') }}">
        </div>

        <div class="field">
          <label>Estratégia</label>
          <select name="Estrategia">
            {% set est = op.get('Estratégia','Venda') %}
            <option value="Venda" {% if est in ['Venda','Wheel'] %}selected{% endif %}>VENDA</option>
            <option value="Compra" {% if est == 'Compra' %}selected{% endif %}>COMPRA</option>
          </select>
        </div>

        <div class="field">
          <label>Tipo</label>
          <select name="Tipo">
            <option value="PUT" {% if op.get('Tipo')=='PUT' %}selected{% endif %}>PUT</option>
            <option value="CALL" {% if op.get('Tipo')=='CALL' %}selected{% endif %}>CALL</option>
          </select>
        </div>

        <div class="field">
          <label>Vencimento</label>
          <input type="text" name="Vencimento" value="{{ op.get('Vencimento','') }}">
        </div>

        <div class="field">
          <label>Status</label>
          <select name="Status">
            <option value="Aberta" {% if op.get('Status')=='Aberta' %}selected{% endif %}>Aberta</option>
            <option value="Encerrada" {% if op.get('Status')=='Encerrada' %}selected{% endif %}>Encerrada</option>
          </select>
        </div>

        <div class="field">
          <label>Contratos</label>
          <input type="number" name="Contratos" value="{{ op.get('Contratos','1') }}">
        </div>
      </div>
    </div>

    <div class="edit-card">
      <div class="edit-section-title">🎯 Dados da Opção</div>
      <div class="edit-grid">
        <div class="field">
          <label>Strike</label>
          <input type="text" name="Strike" value="{{ op.get('Strike','') }}">
        </div>
        <div class="field">
          <label>Prêmio (por opção)</label>
          <input type="text" name="Premio_opcao" value="{{ op.get('Premio_opcao','') }}">
        </div>
        <div class="field">
          <label>Cotação Atual</label>
          <input type="text" name="Cotacao_atual" value="{{ op.get('Cotacao_atual','') }}">
        </div>
      </div>
    </div>

    <div class="edit-card">
      <div class="edit-section-title">💵 Financeiro</div>
      <div class="edit-grid">
        <div class="field">
          <label>Custos Operacionais</label>
          <input type="text" name="Custos" value="{{ op.get('Custos','') }}">
        </div>
        <div class="field">
          <label>IRRF</label>
          <input type="text" name="IRRF" value="{{ op.get('IRRF','') }}">
        </div>
      </div>
    </div>

    <div class="edit-actions">
      <a class="cancel-btn" href="/operacoes-abertas">↩ Voltar</a>
      <button class="save-btn" type="submit">💾 Salvar Alterações</button>
    </div>
  </form>
</div>
{% endblock %}
