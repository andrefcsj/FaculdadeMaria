<style>
.edit-page{max-width:1450px;margin:auto}
.edit-card{background:#fff;border:1px solid #e5e7eb;border-radius:28px;padding:34px;margin-top:28px;box-shadow:0 8px 24px rgba(0,0,0,.05)}
.edit-grid{
 display:grid;
 grid-template-columns:repeat(3,minmax(260px,1fr));
 gap:34px 42px;
 align-items:end;
}
.edit-grid label{
 display:block;
 font-size:24px;
 font-weight:800;
 margin-bottom:12px;
}
.edit-grid input,
.edit-grid select{
 width:100%;
 min-height:68px;
 padding:18px 20px;
 font-size:30px;
 border:1px solid #d1d5db;
 border-radius:18px;
}
.edit-actions{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:24px;
 margin-top:36px;
}
.money{font-variant-numeric:tabular-nums}
@media(max-width:1200px){
 .edit-grid{grid-template-columns:1fr}
}
</style>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.money').forEach(el=>{
    el.addEventListener('blur',()=>{
      let v=el.value.replace(/[^\d,.-]/g,'');
      if(!v) return;
      v=v.replace(/\./g,'').replace(',','.');
      let n=parseFloat(v);
      if(isNaN(n)) return;
      el.value=n.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
      });
    });
  });
});
</script>
