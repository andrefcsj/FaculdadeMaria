{% extends 'base.html' %}
{% block title %}Dashboard | Cortex Invest{% endblock %}
{% block content %}
<style>
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:25px}
.panel{background:linear-gradient(180deg,#0d1c2f,#08111b);border:1px solid #1d3554;border-radius:22px;padding:20px;min-height:260px}
.panel h3{margin-top:0}
.fake-line,.fake-bars{height:200px;display:flex;align-items:flex-end;gap:18px;padding:10px}
.fake-line div{width:14%;border-top:4px solid #3b82f6;height:var(--h)}
.fake-bars div{width:40px;background:#3ee34f;border-radius:8px 8px 0 0;height:var(--h)}
</style>

<div class="chart-grid">
    <div class="panel">
        <h3>📈 EVOLUÇÃO DO LUCRO (R$)</h3>
        <div class="fake-line">
            <div style="--h:140px"></div>
            <div style="--h:60px"></div>
            <div style="--h:60px"></div>
            <div style="--h:60px"></div>
            <div style="--h:60px"></div>
            <div style="--h:60px"></div>
        </div>
    </div>

    <div class="panel">
        <h3>📊 PRÊMIOS RECEBIDOS POR MÊS (R$)</h3>
        <div class="fake-bars">
            <div style="--h:130px"></div>
            <div style="--h:20px"></div>
            <div style="--h:20px"></div>
            <div style="--h:20px"></div>
            <div style="--h:20px"></div>
            <div style="--h:20px"></div>
        </div>
    </div>
</div>
{% endblock %}
